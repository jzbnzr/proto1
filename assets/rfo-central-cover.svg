<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RFO Central cover</title>
  <desc id="desc">Abstract workflow themed artwork for RFO Central project</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1420" cy="140" r="220" fill="#38bdf8" fill-opacity="0.15" />
  <circle cx="190" cy="770" r="260" fill="#60a5fa" fill-opacity="0.16" />

  <g opacity="0.35" stroke="#93c5fd" stroke-width="4" fill="none">
    <path d="M170 220H590" />
    <path d="M640 220H1020" />
    <path d="M1060 220H1410" />
    <path d="M300 440H690" />
    <path d="M730 440H1180" />
    <path d="M450 650H860" />
    <path d="M910 650H1330" />
  </g>

  <g>
    <rect x="140" y="150" width="500" height="130" rx="24" fill="url(#panel)" />
    <rect x="620" y="360" width="450" height="130" rx="24" fill="url(#panel)" />
    <rect x="420" y="570" width="560" height="130" rx="24" fill="url(#panel)" />
  </g>

  <g fill="#f8fafc">
    <text x="140" y="780" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="700">RFO Central</text>
    <text x="140" y="838" font-family="Segoe UI, Arial, sans-serif" font-size="34" opacity="0.9">Workflow orchestration and operational visibility</text>
  </g>
</svg>

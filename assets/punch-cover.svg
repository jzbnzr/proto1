<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Punch cover</title>
  <desc id="desc">Construction operations themed artwork for Punch project</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#292524" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="0" y="700" width="1600" height="200" fill="#1f2937" />

  <g fill="#374151">
    <rect x="120" y="360" width="140" height="340" />
    <rect x="280" y="300" width="140" height="400" />
    <rect x="440" y="240" width="140" height="460" />
    <rect x="600" y="420" width="140" height="280" />
    <rect x="760" y="330" width="140" height="370" />
    <rect x="920" y="260" width="140" height="440" />
  </g>

  <g fill="none" stroke="#fb923c" stroke-width="10" stroke-linecap="round">
    <path d="M1060 500L1230 410L1400 470" />
    <circle cx="1060" cy="500" r="14" fill="#fb923c" />
    <circle cx="1230" cy="410" r="14" fill="#fb923c" />
    <circle cx="1400" cy="470" r="14" fill="#fb923c" />
  </g>

  <g fill="url(#accent)">
    <rect x="1020" y="190" width="400" height="120" rx="20" />
    <rect x="1020" y="335" width="310" height="56" rx="14" />
    <rect x="1020" y="410" width="260" height="56" rx="14" />
  </g>

  <g fill="#fff7ed">
    <text x="120" y="790" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="700">Punch</text>
    <text x="120" y="846" font-family="Segoe UI, Arial, sans-serif" font-size="34" opacity="0.94">Construction workflow and field execution platform</text>
  </g>
</svg>
